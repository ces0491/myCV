name: Render and Deploy Quarto
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'

      - name: Install R Packages
        run: |
          R -e "install.packages('knitr', repos='https://cran.rstudio.com/')"
          R -e "install.packages('rmarkdown', repos='https://cran.rstudio.com/')"

      - name: Render Quarto
        run: quarto render myCV.qmd --to html

      - name: Prepare site output
        run: |
          mkdir -p _site
          cp myCV.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4